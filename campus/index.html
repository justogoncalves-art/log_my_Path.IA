<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Campus.IA — Plataforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#0b3d2e;--forest-700:#14523d;--forest-600:#1d6149;--forest-900:#082a20;
  --sand:#cbbfa6;--sand-300:#cbbfa6;--sand-400:#b8aa8b;--sand-500:#9c8e6f;
  --charcoal:#1b1f23;--charcoal-900:#1b1f23;
  --cream:#fff8e7;--cream-100:#fff8e7;--cream-50:#fffdf6;--cream-200:#f6eed8;
  --bg:#fff8e7;--bg-subtle:#f6eed8;--surface:#fff;
  --ink:#14171a;--text:#14171a;--text2:#4c534f;--muted:#7a7060;
  --on-dark:#fff8e7;--on-dark-muted:rgba(203,191,166,.72);
  --line:#e6dfc9;--line2:rgba(27,31,35,.12);--line-strong:rgba(27,31,35,.2);--line-dark:rgba(255,248,231,.16);
  --danger:#9b3b2e;--success:#1d6149;
  --grad:linear-gradient(135deg,#0b3d2e,#1b1f23);
  --grad-accent:linear-gradient(90deg,#0b3d2e 0%,#cbbfa6 50%,#1b1f23 100%);
  --sh-xs:0 1px 2px rgba(27,31,35,.06);
  --sh-sm:0 1px 3px rgba(27,31,35,.06),0 2px 8px rgba(11,61,46,.05);
  --sh-md:0 4px 16px rgba(11,61,46,.08),0 1px 3px rgba(27,31,35,.05);
  --sh-lg:0 18px 48px rgba(11,61,46,.14),0 4px 12px rgba(27,31,35,.06);
  --sh-card:0 2px 4px rgba(27,31,35,.04),0 12px 32px rgba(11,61,46,.1);
  --sh-dark:0 24px 60px rgba(0,0,0,.4);
  --fd:'Space Grotesk',system-ui,sans-serif;--fs:'Quicksand',system-ui,sans-serif;--fm:'DM Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--text);font-family:var(--fs);-webkit-font-smoothing:antialiased}
button{font-family:inherit}
img{display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(11,61,46,.2);border-radius:999px}
a{color:inherit}

/* ---------- header ---------- */
.hdr{position:sticky;top:0;z-index:60;background:var(--grad);border-bottom:1px solid var(--line-dark);box-shadow:0 6px 24px rgba(0,0,0,.18)}
.hdr-in{display:flex;align-items:center;gap:18px;height:68px;padding:0 22px}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;flex:none}
.brand .ring{width:30px;height:30px;flex:none}
.brand .wm{font-family:var(--fd);font-weight:700;font-size:17px;letter-spacing:.04em;color:var(--sand-300);white-space:nowrap}
.brand .div{width:1.5px;height:26px;background:var(--sand-300);opacity:.5}
.ctas{flex:1;display:flex;justify-content:center;align-items:center;gap:10px;min-width:0}
.hdr-right{display:flex;align-items:center;gap:12px;flex:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;cursor:pointer;font-family:var(--fs);font-weight:600;letter-spacing:-.01em;border:1px solid transparent;transition:transform .12s,background .12s,border-color .12s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-sm{padding:9px 16px;font-size:13px}
.btn-md{padding:12px 22px;font-size:15px}
.btn-lg{padding:15px 28px;font-size:17px}
.btn-sand{background:var(--sand-300);color:var(--charcoal-900);box-shadow:var(--sh-sm)}
.btn-primary{background:var(--forest);color:var(--cream-100);box-shadow:var(--sh-sm)}
.btn-out-d{background:transparent;color:var(--cream-100);border-color:var(--line-dark)}
.btn-out{background:transparent;color:var(--forest);border-color:var(--line-strong)}
.btn-test{border-color:var(--sand-400)}
.btn-full{width:100%}
.embed .hdr{display:none}
.embed .wrap{padding-top:26px}
.ctas-embed{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:0 0 26px}
.lang{display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;border-radius:999px;border:1px solid var(--line-dark);color:var(--cream-100);font-family:var(--fm);font-size:12px;letter-spacing:.08em}
.uname{color:var(--cream-100);font-size:14px;font-weight:500}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--grad);color:var(--cream-100);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex:none}
.icon-btn{width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--cream-100);border:1px solid var(--line-dark);background:transparent}

/* ---------- layout ---------- */
.wrap{max-width:1280px;margin:0 auto;padding:38px 22px 110px}
.kicker{display:inline-flex;align-items:center;gap:10px;font-family:var(--fm);font-weight:500;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.kicker .tick{width:16px;height:1.5px;background:var(--sand-400)}
.accentbar{height:3px;width:120px;background:var(--grad-accent);border-radius:999px}
.h1{font-family:var(--fd);font-weight:700;letter-spacing:-.02em;color:var(--forest);margin:0}
.lead{font-size:18px;line-height:1.5;color:var(--text2);margin:0}
.back{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--forest);margin-bottom:20px;padding:9px 16px;border:1px solid var(--line);border-radius:999px;background:var(--surface);box-shadow:var(--sh-card);transition:transform .15s,border-color .15s}
.back:hover{transform:translateY(-1px);border-color:var(--forest)}
.back .ar{color:var(--forest)}

.card{background:var(--surface);border:1px solid rgba(27,31,35,.04);border-radius:20px;box-shadow:var(--sh-card)}
.card-int{cursor:pointer;transition:transform .18s,box-shadow .18s}
.card-int:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.premium{background:var(--grad);color:var(--cream-100);border:1px solid var(--line-dark);box-shadow:var(--sh-dark)}
.outline{background:var(--surface);border:1px solid var(--line);border-radius:20px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* landing tiles */
.tile{padding:26px 28px;display:flex;flex-direction:column;gap:14px;height:100%;border-radius:20px}
.tile .ico{width:46px;height:46px;border-radius:14px;background:rgba(11,61,46,.08);display:flex;align-items:center;justify-content:center;color:var(--forest)}
.tile .no{font-family:var(--fm);font-size:11px;letter-spacing:.14em;color:var(--muted)}
.tile .tt{font-family:var(--fd);font-weight:700;font-size:21px;color:var(--forest);margin-bottom:6px}
.tile .ds{font-size:14px;line-height:1.45;color:var(--text2)}
.tile .go{margin-top:auto;font-weight:600;font-size:14px;color:var(--forest);display:inline-flex;gap:6px;align-items:center}

/* landing mosaic */
.mgrid{display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:200px;gap:16px}
.mtile{position:relative;overflow:hidden;border-radius:20px;cursor:pointer;display:flex;min-height:180px;transition:transform .18s,box-shadow .18s}
.mtile:hover{transform:translateY(-3px)}
.mtile-light{background:var(--surface);border:1px solid rgba(27,31,35,.05);box-shadow:var(--sh-card)}
.mtile-light:hover{box-shadow:var(--sh-lg)}
.mtile-dark{background:var(--grad);border:1px solid var(--line-dark);box-shadow:var(--sh-dark)}
.mtile-photo{border:1px solid rgba(27,31,35,.06);box-shadow:var(--sh-card)}
.mtile-photo:hover{box-shadow:var(--sh-lg)}
.mtile .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.mtile .shade{position:absolute;inset:0;z-index:1}
.mtile .in{position:relative;z-index:2;padding:24px 26px;display:flex;flex-direction:column;width:100%;height:100%}
.mtile .m-ico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none}
.mtile .m-no{font-family:var(--fm);font-size:11px;letter-spacing:.14em}
.mtile .m-tt{font-family:var(--fd);font-weight:700;line-height:1.1}
.mtile .m-go{margin-top:auto;font-weight:600;font-size:14px;display:inline-flex;gap:6px;align-items:center;padding-top:14px}
.span2{grid-column:span 2}.span3{grid-column:span 3}.span4{grid-column:span 4}.span6{grid-column:span 6}
.rows2{grid-row:span 2}

/* segmented */
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;box-shadow:var(--sh-xs)}
.seg .it{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:999px;cursor:pointer;font-weight:600;font-size:14px;color:var(--text2)}
.seg .it.on{background:var(--forest);color:var(--cream-100)}

/* uni cards */
.uni{cursor:pointer;overflow:hidden;border-radius:20px}
.uni .ph{position:relative;height:150px;overflow:hidden}
.uni .ph img{width:100%;height:100%;object-fit:cover}
.uni .ph .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,23,26,0) 40%,rgba(20,23,26,.55) 100%)}
.heart{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:999px;border:none;background:rgba(20,23,26,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer}
.rankb{position:absolute;bottom:12px;left:12px;font-family:var(--fd);font-weight:700;font-size:12px;color:var(--charcoal-900);background:var(--sand-300);padding:5px 10px;border-radius:999px;white-space:nowrap}
.uni .bd{padding:16px 18px}
.uni .nm{font-family:var(--fd);font-weight:700;font-size:16px;color:var(--forest);margin-bottom:4px}
.loc{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2)}
.chip{font-size:11px;font-weight:600;color:var(--forest-700);background:rgba(11,61,46,.08);padding:4px 9px;border-radius:999px;white-space:nowrap}
.calbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--forest);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;flex:none;padding:0}
.calbtn:hover{border-color:var(--forest);background:rgba(11,61,46,.06)}
.row-card{display:flex;align-items:center;gap:18px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:16px;cursor:pointer;box-shadow:var(--sh-xs);transition:transform .12s,box-shadow .12s,border-color .12s}
.row-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--forest)}

/* filters */
.cols{display:grid;grid-template-columns:268px 1fr;gap:24px;align-items:start}
.filters{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--sh-card);position:sticky;top:84px}
.filters>summary{list-style:none}
.filters>summary::-webkit-details-marker{display:none}
.filters-sum{display:none;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;font-family:var(--fd);font-weight:600;color:var(--forest)}
.filters-body{padding:22px;display:flex;flex-direction:column;gap:16px}
.fl-l{font-family:var(--fm);font-weight:500;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.fl select,.fl input[type=text]{width:100%;height:40px;padding:0 12px;border:1px solid var(--line-strong);border-radius:10px;background:var(--surface);font-family:var(--fs);font-weight:500;font-size:14px;color:var(--text)}
input[type=range]{width:100%;accent-color:var(--forest)}

/* stat tiles */
.stile{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px}
.stile .v{font-family:var(--fd);font-weight:700;font-size:33px;color:var(--forest)}
.stile .l{margin-top:6px;font-family:var(--fm);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

/* modals */
.ov{position:fixed;inset:0;z-index:85;background:rgba(20,23,26,.55);display:flex;align-items:center;justify-content:center;padding:24px}
.modal{width:min(680px,100%);max-height:88vh;overflow-y:auto;background:var(--surface);border-radius:24px;box-shadow:var(--sh-dark);border:1px solid var(--line)}
.modal-d{background:var(--grad);border:1px solid var(--line-dark);color:var(--cream-100)}
.topbar{height:3px;width:100%;background:var(--grad-accent)}
.x{cursor:pointer;width:34px;height:34px;border-radius:999px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);flex:none}
.x-d{border-color:var(--line-dark);color:var(--cream-100)}

/* chatbot */
.bubble{position:fixed;right:22px;bottom:22px;z-index:90;width:60px;height:60px;border-radius:999px;background:var(--grad);box-shadow:0 10px 30px rgba(11,61,46,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line-dark)}
.chatp{position:fixed;right:22px;bottom:94px;z-index:90;width:min(380px,calc(100vw - 32px));height:540px;max-height:calc(100vh - 130px);background:var(--surface);border-radius:22px;border:1px solid var(--line);box-shadow:var(--sh-lg);display:flex;flex-direction:column;overflow:hidden}
.chat-hd{background:var(--grad);padding:16px 18px;display:flex;align-items:center;gap:12px}
.chat-bd{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px}
.msg{max-width:82%;padding:11px 14px;font-size:14px;line-height:1.5}
.msg.bot{background:var(--bg-subtle);color:var(--text);border-radius:16px 16px 16px 4px;align-self:flex-start}
.msg.me{background:var(--forest);color:var(--cream-100);border-radius:16px 16px 4px 16px;align-self:flex-end}
.chip-q{cursor:pointer;align-self:flex-start;padding:8px 13px;border:1px solid var(--line);border-radius:999px;font-size:12px;font-weight:500;color:var(--forest-700);background:var(--surface)}
.chat-ft{padding:13px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px}
.chat-ft input{flex:1;min-width:0;height:42px;padding:0 14px;border:1px solid var(--line-strong);border-radius:999px;font-family:var(--fs);font-size:14px;color:var(--text);outline:none}
.send{width:42px;height:42px;border-radius:999px;background:var(--forest);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;border:none}

/* comparator */
.cmp-wrap{background:var(--surface);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--sh-card)}
.cmp-scroll{overflow-x:auto}
.cmp-grid{display:grid}
.cmp-h{background:var(--grad)}
.cmp-cell{padding:14px 16px;border-left:1px solid var(--line);font-size:14px;line-height:1.3}
.cmp-lab{padding:14px 20px;font-size:14px;color:var(--muted);font-weight:500}
.cmp-group{padding:12px 20px;background:var(--bg-subtle);border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-family:var(--fm);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--forest-700)}
.selchip{cursor:pointer;padding:8px 15px;border-radius:999px;border:1px solid var(--line-strong);background:var(--surface);color:var(--text2);font-weight:600;font-size:14px;white-space:nowrap}
.selchip.on{background:var(--forest);color:var(--cream-100);border-color:var(--forest)}

.hide{display:none!important}

/* ---------- responsive ---------- */
@media(max-width:960px){
  .grid4{grid-template-columns:repeat(2,1fr)}
  .cols{grid-template-columns:1fr}
  .filters{position:static}
  .filters-sum{display:flex}
  .filters:not([open]) .filters-body{display:none}
}
@media(max-width:1000px){
  .hdr-in{height:auto;flex-wrap:wrap;padding:10px 16px;gap:10px}
  .brand{order:1}
  .hdr-right{order:2;margin-left:auto}
  .ctas{order:3;flex-basis:100%;justify-content:flex-start;overflow-x:auto;gap:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .ctas .btn{flex:none}
  .uname{display:none}
  .wrap{padding:28px 16px 120px}
}
@media(max-width:680px){
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .grid4{grid-template-columns:repeat(2,1fr)}
  .h1{font-size:34px!important}
  .ov{padding:0;align-items:flex-end}
  .modal{width:100%;max-height:94vh;border-radius:22px 22px 0 0}
}
@media(max-width:420px){
  .grid4{grid-template-columns:1fr}
  .stile .v{font-size:26px}
}
@media(max-width:980px){
  .mgrid{grid-template-columns:repeat(2,1fr);grid-auto-rows:190px}
  .mgrid .mtile{grid-column:span 1;grid-row:span 1}
  .mgrid .mtile.hero-m{grid-column:span 2}
  .mgrid .mtile.rows2{grid-row:span 1}
}
@media(max-width:560px){
  .mgrid{grid-template-columns:1fr;grid-auto-rows:auto}
  .mgrid .mtile,.mgrid .mtile.hero-m{grid-column:span 1;min-height:180px}
  .mgrid .jobbanner .in{flex-direction:column!important;align-items:flex-start!important;gap:12px}
}
</style>
</head>

function vComparator(){
 const segU=S.cmpMode==='universidades',segP=S.cmpMode==='carreras';
 let headers=[],rows=[];
 const minIdx=a=>a.indexOf(Math.min(...a)),maxIdx=a=>a.indexOf(Math.max(...a));
 const mk=(label,vals,best)=>({label,cells:vals.map((v,i)=>({v,best:best===i}))});
 let selector='';
 if(segU){
   const items=S.cmpUnis.map(id=>UNIS.find(u=>u.id===id)).filter(Boolean);
   headers=items.map(u=>({nombre:u.nombre,sub:u.ciudad+', '+u.pais,foto:u.foto}));
   const qs=items.map(u=>u.qs),the=items.map(u=>u.the),arwu=items.map(u=>u.arwu),coste=items.map(u=>u.costeMedio),vida=items.map(u=>u.vida.alquiler+u.vida.comida+u.vida.transporte),empA=items.map(u=>Math.round(u.progs.reduce((a,p)=>a+p.emp,0)/u.progs.length)),salA=items.map(u=>Math.round(u.progs.reduce((a,p)=>a+p.sal,0)/u.progs.length));
   rows=[
    {group:'Identidad',rows:[mk('País',items.map(u=>u.pais),-1),mk('Ciudad',items.map(u=>u.ciudad),-1),mk('Tipo',items.map(u=>u.tipo),-1),mk('Fundación',items.map(u=>''+u.fund),-1),mk('Nº de alumnos',items.map(u=>num(u.alumnos)),-1)]},
    {group:'Rankings',rows:[mk('QS 2025',items.map(u=>'#'+u.qs),minIdx(qs)),mk('THE 2025',items.map(u=>'#'+u.the),minIdx(the)),mk('ARWU 2024',items.map(u=>'#'+u.arwu),minIdx(arwu)),mk('Ranking nacional',items.map(u=>'#'+u.nac),-1)]},
    {group:'Académico',rows:[mk('Idioma',items.map(u=>u.idiomas.join(', ')),-1),mk('Acreditaciones',items.map(u=>u.acred.join(' · ')),-1),mk('Programas',items.map(u=>''+u.progs.length),-1)]},
    {group:'Costes',rows:[mk('Matrícula media / año',items.map(u=>eur(u.costeMedio)),minIdx(coste)),mk('Coste de vida / mes',vida.map(v=>'€'+v.toLocaleString('es-ES')),minIdx(vida)),mk('Índice de vida',items.map(u=>u.vida.indice),-1)]},
    {group:'Resultados',rows:[mk('Empleabilidad media',empA.map(v=>v+'%'),maxIdx(empA)),mk('Salario medio / año',salA.map(v=>'€'+v.toLocaleString('es-ES')),maxIdx(salA))]}
   ];
   selector=`<div style="background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:18px"><div style="font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Selecciona hasta 4 universidades</div><div style="display:flex;flex-wrap:wrap;gap:9px">${UNIS.map(u=>`<div class="selchip${S.cmpUnis.includes(u.id)?' on':''}" onclick="App.cmpToggle('${u.id}')">${esc(u.corto)}</div>`).join('')}</div></div>`;
 }else{
   const allP=UNIS.flatMap(u=>u.progs.map(p=>({...p,uniFull:u.nombre,foto:u.foto})));
   const items=S.cmpProgs.map(id=>allP.find(p=>p.id===id)).filter(Boolean);
   headers=items.map(p=>({nombre:p.nom,sub:p.uniFull,foto:p.foto}));
   const coste=items.map(p=>p.coste),dur=items.map(p=>p.dur),emp=items.map(p=>p.emp),sal=items.map(p=>p.sal);
   rows=[
    {group:'Programa',rows:[mk('Universidad',items.map(p=>p.uniFull),-1),mk('Tipo',items.map(p=>p.tipo),-1),mk('Área',items.map(p=>p.area),-1),mk('Código RIASEC',items.map(p=>p.rp+p.rs),-1),mk('Idioma',items.map(p=>p.idi),-1),mk('Modalidad',items.map(p=>p.mod),-1)]},
    {group:'Admisión y coste',rows:[mk('Duración',dur.map(v=>v+' años'),minIdx(dur)),mk('Coste / año',items.map(p=>eur(p.coste)),minIdx(coste)),mk('Becas',items.map(p=>p.beca?'Sí':'No'),-1),mk('Nota de acceso',items.map(p=>p.acc),-1),mk('Fuente nota',items.map(p=>p.accT),-1)]},
    {group:'Resultados',rows:[mk('Empleo a 2 años',emp.map(v=>v+'%'),maxIdx(emp)),mk('Salario medio',sal.map(v=>'€'+v.toLocaleString('es-ES')),maxIdx(sal))]}
   ];
 }
 const n=Math.max(headers.length,1);
 const grid=`grid-template-columns:210px repeat(${n},minmax(150px,1fr))`;
 const head=`<div class="cmp-grid cmp-h" style="${grid}"><div style="padding:20px;display:flex;align-items:flex-end"><span style="font-family:var(--fm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--on-dark-muted)">Comparando</span></div>${headers.map(h=>`<div style="padding:18px 16px;border-left:1px solid var(--line-dark);display:flex;flex-direction:column;gap:8px"><img src="${h.foto}" style="width:46px;height:46px;border-radius:12px;object-fit:cover"><div style="font-family:var(--fd);font-weight:700;font-size:14px;line-height:1.15;color:var(--cream-100)">${esc(h.nombre)}</div><div style="font-size:11px;line-height:1.2;color:var(--on-dark-muted)">${esc(h.sub)}</div></div>`).join('')}</div>`;
 const body=rows.map(g=>`<div class="cmp-group">${g.group}</div>${g.rows.map(r=>`<div class="cmp-grid" style="${grid};border-bottom:1px solid var(--line)"><div class="cmp-lab">${r.label}</div>${r.cells.map(c=>`<div class="cmp-cell" style="background:${c.best?'rgba(11,61,46,.08)':'transparent'};color:${c.best?'var(--forest)':'var(--text2)'};font-weight:${c.best?'700':'500'}">${c.best?'<span style="color:var(--sand-500)">★ </span>':''}${esc(c.v)}</div>`).join('')}</div>`).join('')}`).join('');
 return `<section>
 <div class="back" onclick="App.nav('landing')"><span class="ar">←</span> Inicio</div>
 <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px">
   <div><div class="kicker"><span class="tick"></span>COMPARADOR · DATO A DATO</div><h1 class="h1" style="font-size:42px;margin:12px 0 4px">Compara y decide con datos</h1><span style="font-size:14px;color:var(--text2)">El mejor candidato de cada fila se resalta automáticamente.</span></div>
   <div class="seg"><div class="it${segU?' on':''}" onclick="App.cmpMode('universidades')">Universidades</div><div class="it${segP?' on':''}" onclick="App.cmpMode('carreras')">Carreras</div></div>
 </div>
 ${selector}
 <div class="cmp-wrap"><div class="cmp-scroll">${head}${body}</div></div>
</section>`;}

function pad(n){return (''+n).padStart(2,'0');}

function gcalUrl(e){const s=evDate(e),f=new Date(s.getTime()+2*3600*1000);return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(e.titulo)+'&dates='+gcalFmt(s)+'/'+gcalFmt(f)+'&ctz=Europe/Madrid&details='+encodeURIComponent(e.desc+'\n\nvia My Campus.IA · @mypath.ia')+'&location='+encodeURIComponent(e.lugar);}
function calIcons(e){const g=gcalUrl(e);return `<div style="display:flex;gap:8px;align-items:center" onclick="event.stopPropagation()">
  <a href="${g}" target="_blank" rel="noopener" title="Añadir a Google Calendar" class="calbtn">${icGcal}</a>
  <button class="calbtn" title="Descargar .ics (Apple / Outlook)" onclick="App.icsEvent('${e.id}')">${icDown}</button>
</div>`;}
const icGcal='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M12 14v4M10 16h4"/></svg>';
const icDown='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';

function calGrid(){
 const mesesUsados=[...new Set(EVENTS.map(e=>e.mes))].sort((a,b)=>MES_IDX[a]-MES_IDX[b]);
 const dow=['L','M','X','J','V','S','D'];
 const months=mesesUsados.map(mk=>{
   const mi=MES_IDX[mk];const first=new Date(2026,mi,1);let start=first.getDay();start=(start+6)%7;
   const days=new Date(2026,mi+1,0).getDate();
   let cells='';for(let i=0;i<start;i++)cells+='<div></div>';
   for(let d=1;d<=days;d++){const evs=EVENTS.filter(e=>e.mes===mk&&+e.dia===d);const has=evs.length>0;const c=has?eventColor(evs[0].tipo):null;
     cells+=`<div style="aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;position:relative;${has?`background:${c.bg};color:${c.fg};font-weight:700;cursor:pointer`:'color:var(--text2)'}" ${has?`title="${esc(evs[0].titulo)}"`:''}>${d}${has?`<span style="position:absolute;bottom:5px;width:5px;height:5px;border-radius:999px;background:${c.fg}"></span>`:''}</div>`;}
   return `<div class="card" style="padding:20px"><div style="font-family:var(--fd);font-weight:700;font-size:17px;color:var(--forest);margin-bottom:14px">${MES_NOM[mi]} 2026</div>
     <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">${dow.map(x=>`<div style="text-align:center;font-family:var(--fm);font-size:10px;letter-spacing:.06em;color:var(--muted)">${x}</div>`).join('')}</div>
     <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div></div>`;
 }).join('');
 const agenda=EVENTS.slice().sort((a,b)=>evDate(a)-evDate(b)).map(e=>{const on=S.eventRSVP.includes(e.id);const c=eventColor(e.tipo);return `<div style="display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)">
     <div style="width:52px;flex:none;text-align:center"><div style="font-family:var(--fd);font-weight:700;font-size:20px;color:var(--forest);line-height:1">${esc(e.dia)}</div><div style="font-family:var(--fm);font-size:10px;letter-spacing:.06em;color:var(--muted)">${esc(e.mes)}</div></div>
     <div style="flex:1;min-width:0"><span style="font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:${c.fg};background:${c.bg};padding:3px 8px;border-radius:999px">${esc(e.tipo)}</span><div style="font-family:var(--fd);font-weight:700;font-size:15px;color:var(--forest);margin-top:6px;line-height:1.15">${esc(e.titulo)}</div><div class="loc" style="font-size:12px;margin-top:2px">${pin('var(--sand-500)')}${esc(e.lugar)}</div></div>
     <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">${calIcons(e)}<button class="btn btn-sm ${on?'btn-out':'btn-primary'}" style="padding:6px 12px" onclick="App.rsvpEvent('${e.id}')">${on?'✓':esc(e.cta)}</button></div>
   </div>`;}).join('');
 return `<div style="display:grid;grid-template-columns:1.3fr 1fr;gap:24px;align-items:start">
   <div style="display:flex;flex-direction:column;gap:18px">${months}</div>
   <div class="card" style="padding:22px 24px"><div style="font-family:var(--fd);font-weight:600;font-size:17px;color:var(--forest);margin-bottom:6px">Próximos eventos</div>${agenda}</div>
 </div>`;}

 applyArea(area){S.view='universities';S.uniMode='mosaico';S.programFilter=area;S.programOpen=null;S.contactOpen=false;S.filters={pais:'Todos',tipo:'Todos',idioma:'Todos',area:'Todos',rankingMax:300,costeMax:50000,beca:false};window.scrollTo(0,0);render();},
 progSearch(v){S.programQuery=v;const q=v.trim().toLowerCase();const list=TOPPROGS.map((p,i)=>({p,i})).filter(o=>!q||o.p.nombre.toLowerCase().includes(q)||o.p.area.toLowerCase().includes(q));const g=document.getElementById('progGrid');if(g)g.innerHTML=progGrid(list);},
 openProgram(i){S.programOpen=i;render();},
 closeProgram(){S.programOpen=null;render();},
 openStats(){S.statsOpen=true;S.statsLoc='global';S.settingsOpen=false;render();},
 closeStats(){S.statsOpen=false;render();},
 toggleSettings(){S.settingsOpen=!S.settingsOpen;render();},
 toggleLang(){S.lang=S.lang==='ES'?'EN':'ES';render();},
 openTest(){S.testOpen=true;S.testPaid=false;S.statsOpen=false;render();},
 closeTest(){S.testOpen=false;render();},
 payContinue(){S.testPaid=true;render();},
 startTest(){S.testOpen=false;App.nav('riasec');},
 openContact(){S.contactOpen=true;S.contactSent=false;render();},
 closeContact(){S.contactOpen=false;render();},
 sendContact(){S.contactSent=true;render();},
 openAbroad(){S.abroadOpen=true;S.abroadSent=false;S.statsOpen=S.testOpen=S.settingsOpen=false;render();},
 closeAbroad(){S.abroadOpen=false;render();},
 sendAbroad(){S.abroadSent=true;render();},
 cmpMode(m){S.cmpMode=m;render();},
 cmpToggle(id){const i=S.cmpUnis.indexOf(id);if(i>=0)S.cmpUnis.splice(i,1);else if(S.cmpUnis.length<4)S.cmpUnis.push(id);render();},
 reqTuttor(id){const i=S.tuttorReq.indexOf(id);if(i>=0)S.tuttorReq.splice(i,1);else S.tuttorReq.push(id);render();},
 tuttorTab(t){S.tuttorTab=t;render();},
 clView(v){S.clView=v;render();},
 statsSelect(k){S.statsLoc=k;render();},
 openCV(){S.cvOpen=true;render();},
 closeCV(){S.cvOpen=false;render();},
 saveCV(){S.cvUploaded=true;S.cvOpen=false;render();},
 icsEvent(id){const e=EVENTS.find(x=>x.id===id);if(!e)return;const s=evDate(e),f=new Date(s.getTime()+2*3600*1000);const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//My Campus.IA//Campus Live//ES','BEGIN:VEVENT','UID:'+id+'@mycampusia','DTSTAMP:'+gcalFmt(new Date()),'DTSTART:'+gcalFmt(s),'DTEND:'+gcalFmt(f),'SUMMARY:'+e.titulo,'LOCATION:'+e.lugar,'DESCRIPTION:'+e.desc.replace(/,/g,'\\,'),'END:VEVENT','END:VCALENDAR'].join('\r\n');const a=document.createElement('a');a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);a.download=id+'.ics';document.body.appendChild(a);a.click();a.remove();},
 rsvpEvent(id){const i=S.eventRSVP.indexOf(id);if(i>=0)S.eventRSVP.splice(i,1);else S.eventRSVP.push(id);render();},
 applyJob(id){const i=S.jobApplied.indexOf(id);if(i>=0)S.jobApplied.splice(i,1);else S.jobApplied.push(id);render();},
 toggleChat(){S.chatOpen=!S.chatOpen;render();if(S.chatOpen){const el=document.getElementById('chatInput');if(el)el.focus();}},
 chatChip(i){const q=['¿Qué carrera encaja conmigo?','¿Dónde es más barato vivir?','¿Hay becas disponibles?','¿Cómo comparo universidades?'][i];App._pushChat(q);},
 chatSend(){const el=document.getElementById('chatInput');if(!el)return;const v=el.value.trim();if(!v)return;el.value='';App._pushChat(v);},
 _pushChat(text){S.chatMsgs.push({role:'me',text});S.chatMsgs.push({role:'bot',text:botAnswer(text)});render();const b=document.getElementById('chatBody');if(b)b.scrollTop=b.scrollHeight;const el=document.getElementById('chatInput');if(el)el.focus();}
};
window.App=App;
try{const _v=new URLSearchParams(location.search).get('view');const _map={universities:'universities',universidades:'universities',programs:'programs',programas:'programs',comparator:'comparator',riasec:'riasec'};if(_v&&_map[_v])S.view=_map[_v];}catch(e){}
render();
</script>
